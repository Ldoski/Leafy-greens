; Leafy Greens Project — PlatformIO Configuration
; Switch between sketches by changing default_envs

[platformio]
src_dir        = .
default_envs   = master_node

; ===== Common settings =====
[env]
platform       = espressif32
board          = esp32dev
framework      = arduino
monitor_speed  = 115200
upload_speed   = 921600
board_build.f_cpu = 160000000L

lib_deps =
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit SGP30 Sensor@^2.0.0
    adafruit/Adafruit AS7341@^1.3.1
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/Adafruit BusIO@^1.16.1

monitor_filters =
    esp32_exception_decoder
    time

build_flags =
    -DCORE_DEBUG_LEVEL=3

; ===== Sensor nodes =====
[env:slave_node]
build_src_filter = +<slave_node.cpp>

[env:master_node]
build_src_filter = +<master_node.cpp>
lib_deps =
    ${env.lib_deps}
    bblanchon/ArduinoJson@^6.21.3

; ===== Utilities =====
[env:test_all_sensors]
build_src_filter = +<test_all_sensors.cpp>
lib_deps = ${env.lib_deps}

[env:mq3_calibration]
build_src_filter = +<mq3_calibration_code.cpp>
lib_deps = ${env.lib_deps}

[env:nvs_erase]
build_src_filter = +<nvs_eraser.cpp>
lib_deps =

[env:as7341_test]
build_src_filter = +<AS7341.cpp>
lib_deps = ${env.lib_deps}
board = esp32-c3-devkitm-1

; =============================================================
; ===== THESIS ML BENCHMARKS ==================================
; =============================================================
; ML folder structure:
;   Code/ML/aifes/output_nir/    — AIfES headers + dataset headers
;   Code/ML/tflite/              — tflm_model_nir.h
;   Code/ML/tinyol/              — TinyOL weights + benchmark
;
; Run order:
;   1. aifes/prepare_dataset_NIR.py  ->  aifes/output_nir/mould_prediction_dataset_nir.h
;                                        aifes/output_nir/held_out_dataset.h
;                                        aifes/output_nir/combined_training_dataset_nir.h
;   2. aifes/train_model_NIR.py      ->  aifes/output_nir/aifes_weights_nir.h
;                                        tflite/tflm_model_nir.h
;   3. tinyol/train_tinyol_backbone.py-> tinyol/tinyol_weights.h
;
; Then flash the relevant env below and measure with PPK2 (GPIO2 LED window).

; ===== Live AIfES Inference on Master Node =====
[env:master_node_live]
build_src_filter = +<master_node_live.cpp>
build_flags =
    ${env.build_flags}
    -I../ML/aifes/output_nir
lib_deps =
    ${env.lib_deps}
    bblanchon/ArduinoJson@^6.21.3
    https://github.com/Fraunhofer-IMS/AIfES_for_Arduino

; ===== Step 1a — AIfES Inference (float32, 3-class softmax) =====
[env:aifes_inference_nir]
build_src_filter = +<../ML/aifes/aifes_inference_nir.cpp>
build_flags =
    ${env.build_flags}
    -I../ML/aifes/output_nir
lib_deps =
    ${env.lib_deps}
    https://github.com/Fraunhofer-IMS/AIfES_for_Arduino

; ===== Step 1b — TFLite Micro Inference (INT8, 3-class softmax) =====
[env:tflm_inference_nir]
build_src_filter = +<../ML/tflite/tflm_inference_nir.cpp>
build_flags =
    -I../ML/tflite
    -DCORE_DEBUG_LEVEL=0
lib_deps =
    ${env.lib_deps}
    https://github.com/eloquentarduino/tflm_esp32
    https://github.com/eloquentarduino/EloquentTinyML

; ===== Step 2 — TinyOL On-Device Fine-Tuning =====
; Needs: tinyol/tinyol_weights.h (from tinyol/train_tinyol_backbone.py)
;        aifes/output_nir/held_out_dataset.h
;        aifes/output_nir/mould_prediction_dataset_nir.h
[env:tinyol_benchmark]
build_src_filter = +<../ML/tinyol/tinyol_benchmark.cpp>
build_flags =
    ${env.build_flags}
    -I../ML/aifes/output_nir
    -I../ML/tinyol
lib_deps =
